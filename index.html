<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Qomicex Plugin SDK 文档</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #3b82f6;
      --theme-color-light: #60a5fa;
    }

    .cover h1 {
      font-size: 3.5rem;
      font-weight: 700;
      margin: 2.5rem 0 1.5rem;
    }

    .cover p {
      font-size: 1.25rem;
      line-height: 1.8;
      margin: 0.5rem 0;
      color: #666;
    }

    .app-name-link {
      font-size: 1.5rem !important;
    }

    pre code {
      padding: 1.5rem;
      border-radius: 8px;
      font-size: 0.9rem;
    }

    table {
      border-collapse: collapse;
      margin: 1.5rem 0;
      width: 100%;
    }

    th, td {
      border: 1px solid #e5e7eb;
      padding: 0.75rem 1rem;
      text-align: left;
    }

    th {
      background-color: #f9fafb;
      font-weight: 600;
    }

    .sidebar-nav > ul > li > a {
      font-weight: 600;
      color: #374151;
    }

    .sidebar-nav ul {
      margin-left: 0.5rem;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Qomicex Plugin SDK',
      repo: 'Qomicex-Public/Qomicex.Public',
      loadSidebar: true,
      loadNavbar: true,
      coverpage: true,
      maxLevel: 4,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索文档...',
        noData: '没有找到结果',
        depth: 6,
        hideOtherSidebarContent: false,
      },
      copyCode: {
        buttonText: '复制',
        errorText: '错误',
        successText: '已复制',
      },
      pagination: {
        prevText: '上一页',
        nextText: '下一页',
        crossChapter: true,
        crossChapterText: false,
      },
      count: {
        countable: true,
        fontsize: '0.9em',
        color: 'rgb(90, 90, 90)',
        language: 'chinese',
      },
      emoji: {
        emoji: true,
      },
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-emoji@1/dist/docsify-emoji.min.js"></script>
</body>
</html>
