<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Qomicex Plugin SDK 文档</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /* 自定义样式 */
    :root {
      --theme-color: #3b82f6;
      --theme-color-light: #60a5fa;
    }

    .cover h1 {
      font-size: 3.5rem;
      font-weight: 700;
      margin: 2.5rem 0 1.5rem;
    }

    .cover p {
      font-size: 1.25rem;
      line-height: 1.8;
      margin: 0.5rem 0;
      color: #666;
    }

    .app-name-link {
      font-size: 1.5rem !important;
    }

    /* 代码块样式优化 */
    pre code {
      padding: 1.5rem;
      border-radius: 8px;
      font-size: 0.9rem;
    }

    /* 表格样式 */
    table {
      border-collapse: collapse;
      margin: 1.5rem 0;
      width: 100%;
    }

    th, td {
      border: 1px solid #e5e7eb;
      padding: 0.75rem 1rem;
      text-align: left;
    }

    th {
      background-color: #f9fafb;
      font-weight: 600;
    }

    /* 警告框样式 */
    .alert {
      padding: 1rem 1.25rem;
      border-radius: 8px;
      margin: 1.5rem 0;
      border-left: 4px solid;
    }

    .alert-warning {
      background-color: #fef3c7;
      border-color: #f59e0b;
      color: #92400e;
    }

    .alert-info {
      background-color: #dbeafe;
      border-color: #3b82f6;
      color: #1e40af;
    }

    .alert-danger {
      background-color: #fee2e2;
      border-color: #ef4444;
      color: #991b1b;
    }

    .alert-success {
      background-color: #d1fae5;
      border-color: #10b981;
      color: #065f46;
    }

    /* 搜索框样式 */
    .search input {
      background-color: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 0.5rem 1rem;
    }

    /* 侧边栏样式 */
    .sidebar-nav > ul > li > a {
      font-weight: 600;
      color: #374151;
    }

    .sidebar-nav ul {
      margin-left: 0.5rem;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Qomicex Plugin SDK',
      repo: '',
      loadSidebar: true,
      loadNavbar: true,
      coverpage: true,
      maxLevel: 4,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索文档...',
        noData: '没有找到结果',
        depth: 6,
        hideOtherSidebarContent: false,
      },
      copyCode: {
        buttonText: '复制',
        errorText: '错误',
        successText: '已复制',
      },
      pagination: {
        prevText: '上一页',
        nextText: '下一页',
        crossChapter: true,
        crossChapterText: false,
      },
      tabs: {
        persist: true,
        sync: true,
        theme: 'classic',
        tabComments: true,
        tabHeadings: true,
      },
      themeable: {
        responsiveThemes: ['light', 'dark'],
      },
      count: {
        countable: true,
        fontsize: '0.9em',
        color: 'rgb(90, 90, 90)',
        language: 'chinese',
      },
      progress: {
        position: 'top',
        color: 'var(--theme-color)',
        height: '3px',
      },
      emoji: {
        emoji: true,
      },
      footer: {
        message: 'Qomicex Plugin SDK 文档',
        copyYear: '2024',
        copyright: 'Qomicex',
      },
      plugins: [
        function(hook, vm) {
          hook.ready(function() {
            console.log('Qomicex Plugin SDK 文档加载完成');
          });
        },
      ],
    };
  </script>
  <!-- Docsify 核心库 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <!-- 搜索插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <!-- 代码复制插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <!-- 分页插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <!-- 标签页插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-tabs@1/dist/docsify-tabs.min.js"></script>
  <!-- 字数统计插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-count@1/dist/countable.min.js"></script>
  <!-- 进度条插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-progress@1/dist/progress.min.js"></script>
  <!-- Emoji 插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-emoji@1/dist/docsify-emoji.min.js"></script>
  <!-- 页脚插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-footer@1/dist/docsify-footer.min.js"></script>
</body>
</html>
